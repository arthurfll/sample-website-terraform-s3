name: Terraform Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-infra:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_PRIVATE_KEY }}
          aws-region: us-east-1

      - name: Verificar identidade AWS
        run: aws sts get-caller-identity

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Import
        run: |
          terraform import aws_s3_bucket.s3_bucket_1 {{BUCKET_NAME}} || true
          terraform import aws_s3_bucket_public_access_block.s3_bucket_1 {{BUCKET_NAME}} || true
          terraform import aws_s3_bucket_policy.s3_bucket_1 {{BUCKET_NAME}} || true
          terraform import aws_s3_bucket_website_configuration.s3_bucket_1 {{BUCKET_NAME}} || true

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Listar buckets
        run: aws s3 ls

  deploy-app:
    runs-on: ubuntu-latest
    needs: deploy-infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Verificar se index.html foi alterado
        id: check
        run: |
          git diff --name-only HEAD~1 HEAD | grep '^src/index.html$' && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Configurar credenciais AWS
        if: steps.check.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_PRIVATE_KEY }}
          aws-region: us-east-1

      - name: Upload index.html
        if: steps.check.outputs.changed == 'true'
        run: aws s3 cp src/index.html s3://{{BUCKET_NAME}}/index.html


